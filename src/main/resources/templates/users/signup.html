<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
<h1>회원가입</h1>
<form th:action="@{/users/signup}" th:object="${signupRequestDTO}" method="post">
    <label>이메일:</label>
    <input type="email" th:field="*{email}" required><br>
    <label>비밀번호:</label>
    <input type="password" th:field="*{password}" required><br>
    <label>이름:</label>
    <input type="text" th:field="*{name}" required><br>
    <label>전화번호:</label>
    <input type="text" th:field="*{phone}"><br>
    <label>생년월일:</label>
    <input type="date" th:field="*{birthDate}"><br>
    <label>프로필 이미지:</label>
    <input type="text" th:field="*{profileImg}"><br>
    <button type="submit">회원가입</button>
</form>

<p th:if="${error}" th:text="${error}"></p>
<p><a th:href="@{/users/login}">로그인</a></p>
</body>
</html>
